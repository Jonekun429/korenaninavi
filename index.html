<style>
  :root{
    --paper:#f4f6fb; --card:#FFFFFF; --ink:#1a2236; --ink-soft:#57627a; --ink-faint:#7e8698;
    --excel:#004bad; --excel-bright:#1a5fc4; --excel-wash:#e6edfa;
    --grid:#dfe5f0; --grid-soft:#eef1f8; --line:#dfe5f0; --select:#004bad;
    --accent:#0d9488; --accent-bright:#13b3a4; --accent-wash:#e3f4f2; --danger:#c2410c;
    --shadow:0 1px 2px rgba(20,24,33,.04), 0 14px 30px -18px rgba(20,24,33,.22);
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Noto Sans JP',system-ui,-apple-system,sans-serif;
    --c-agg:#004bad; --c-log:#B7791F; --c-look:#2B6CB0; --c-text:#805AD5;
    --c-date:#2C9C9C; --c-math:#C05621; --c-stat:#B83280; --c-new:#C53030; --c-info:#6366F1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  html{overflow-x:hidden}
  body{
    font-family:var(--sans);color:var(--ink);background-color:var(--paper);
    background-image:radial-gradient(1100px 460px at 50% -170px, var(--excel-wash) 0%, rgba(233,246,240,0) 70%);
    background-repeat:no-repeat;line-height:1.75;-webkit-font-smoothing:antialiased;min-height:100vh;
    overflow-x:hidden;
    font-size:16px;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px 96px}


  /* 引っ張って更新 */
  .ptr{position:fixed;top:-48px;left:0;right:0;display:flex;justify-content:center;z-index:70;pointer-events:none;opacity:0}
  .ptr-spin{width:36px;height:36px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);box-shadow:var(--shadow);display:grid;place-items:center}
  .ptr-spin::after{content:"";width:16px;height:16px;border-radius:50%;border:2.6px solid var(--grid);border-top-color:var(--excel);transition:border-top-color .15s}
  .ptr.ready .ptr-spin::after{border-top-color:var(--excel-bright);border-right-color:var(--excel-bright)}
  .ptr.spinning .ptr-spin::after{animation:ptrspin .6s linear infinite}
  @keyframes ptrspin{to{transform:rotate(360deg)}}

  header{padding:36px 0 10px;text-align:center}
  h1{font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:-.02em;line-height:1.15;margin-bottom:10px;color:var(--ink)}
  .lede{color:var(--ink-soft);font-size:15px;max-width:540px;margin:0 auto;font-weight:500}

  .searchwrap{margin:18px 0 22px;max-width:640px}
  /* 大きな検索フィールド */
  .formulabar{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:999px;box-shadow:0 2px 4px rgba(20,24,33,.04),0 18px 38px -22px rgba(20,24,33,.3);overflow:hidden;transition:border-color .18s,box-shadow .18s}
  .formulabar:focus-within{border-color:var(--excel);box-shadow:0 0 0 4px rgba(15,49,146,.13),0 18px 38px -22px rgba(20,24,33,.3)}
  .fxtab{display:flex;align-items:center;justify-content:center;padding:0 4px 0 22px;color:var(--ink-faint)}
  .fxtab svg{width:21px;height:21px;display:block}
  .formulabar:focus-within .fxtab{color:var(--excel)}
  #q{flex:1;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:17px;font-weight:500;color:var(--ink);padding:17px 14px}
  #q::placeholder{color:var(--ink-faint);font-weight:400}
  .clearbtn{border:none;background:transparent;cursor:pointer;color:var(--ink-faint);font-size:20px;padding:0 22px;display:none;align-items:center}
  .clearbtn:hover{color:var(--ink)}
  .clearbtn.show{display:flex}

  /* ===== 左サイドバー・レイアウト ===== */
  .appshell{padding-left:264px;padding-top:56px}
  .sidebar{position:fixed;top:56px;left:0;width:264px;height:calc(100vh - 56px);overflow-y:auto;background:var(--card);border-right:1px solid var(--line);padding:18px 14px 24px;display:flex;flex-direction:column;gap:2px}
  .sb-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .sb-mark{font-family:var(--mono);font-weight:700;font-size:17px;color:#fff;background:var(--excel);width:36px;height:36px;border-radius:10px;display:grid;place-items:center;box-shadow:0 6px 14px -6px rgba(15,49,146,.55)}
  .sb-name{font-weight:900;font-size:18px;line-height:1.1}
  .sb-sub{font-size:11px;color:var(--ink-faint);font-weight:600;letter-spacing:.04em}
  .sb-nav{display:flex;flex-direction:column;gap:2px}
  .sb-sec{padding:6px 0 10px}
  .sb-label{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--g);padding:6px 12px 7px}
  .sb-dot{width:8px;height:8px;border-radius:3px;background:var(--g);flex:0 0 auto;margin-right:7px}
  .modetab{position:relative;display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:transparent;color:var(--ink-soft);font-family:var(--sans);font-weight:700;font-size:15.5px;padding:13px 12px;border-radius:10px;cursor:pointer;transition:background .14s,color .14s}
  .modetab .ic{font-family:var(--mono);font-weight:700;font-size:13px;width:26px;height:26px;border-radius:7px;background:color-mix(in srgb,var(--g) 14%,#fff);display:grid;place-items:center;color:var(--g);flex:0 0 auto;transition:all .14s}
  .modetab:hover{background:color-mix(in srgb,var(--g) 7%,#fff)}
  .modetab.active{background:color-mix(in srgb,var(--g) 13%,#fff);color:var(--g)}
  .modetab.active .ic{background:var(--g);color:#fff}
  .modetab.active::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:4px;border-radius:0 4px 4px 0;background:var(--g)}
  .sb-foot{margin-top:6px;padding:14px 12px 2px;font-size:12px;color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:8px;border-top:1px solid var(--line)}
  .bigtext-btn{display:block;width:calc(100% - 8px);margin:12px 4px 0;padding:11px 12px;font-family:var(--sans);font-size:14.5px;font-weight:800;color:var(--excel);background:var(--excel-wash);border:1.5px solid color-mix(in srgb,var(--excel) 30%,#fff);border-radius:10px;cursor:pointer;transition:all .14s}
  .bigtext-btn:hover{background:var(--excel);color:#fff}
  body.bigtext{zoom:1.16}
  body.bigtext .bigtext-btn{background:var(--excel);color:#fff}
  .sb-fmark{font-family:var(--mono);font-weight:700;color:var(--excel)}

  /* モバイル：トップバー＋ドロワー（PCでは非表示） */
  .topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:130;display:flex;align-items:center;gap:14px;padding:0 22px;background:linear-gradient(135deg,#004bad 0%,#003e92 55%,#003479 100%);color:#fff;box-shadow:0 2px 14px -5px rgba(0,52,121,.5)}
  .tb-logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:.01em;color:#fff}
  .tb-mark{font-family:var(--mono);font-weight:700;font-size:15px;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.18);display:grid;place-items:center;color:#fff}
  .tb-tag{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.85);border-left:1px solid rgba(255,255,255,.32);padding-left:14px}
  @media(max-width:620px){.tb-tag{display:none}}
  .mtopbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;z-index:40;align-items:center;gap:10px;padding:0 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .mburger{display:inline-flex;flex-direction:column;justify-content:center;gap:4px;width:38px;height:38px;padding:8px;background:none;border:none;cursor:pointer}
  .mburger span{display:block;height:2.5px;border-radius:2px;background:var(--ink);transition:transform .22s,opacity .22s}
  body.drawer-open .mburger span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  body.drawer-open .mburger span:nth-child(2){opacity:0}
  body.drawer-open .mburger span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
  .mtop-brand{font-weight:900;font-size:17px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .mtop-mark{font-family:var(--mono);font-weight:700;color:#fff;background:var(--excel);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px}
  .mbackdrop{display:none;position:fixed;inset:0;z-index:110;background:rgba(15,20,28,.42);opacity:0;visibility:hidden;transition:opacity .26s,visibility .26s}
  body.drawer-open .mbackdrop{opacity:1;visibility:visible}
  .sb-close{display:none;position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:20px;line-height:1;cursor:pointer;place-items:center}
  .sb-close:hover{border-color:var(--excel);color:var(--excel)}
  /* 並べ替え */
  .sb-edit{margin:0 6px 6px;align-self:flex-start;font-family:var(--sans);font-weight:700;font-size:12px;color:var(--ink-soft);background:transparent;border:1.5px solid var(--line);border-radius:8px;padding:5px 12px;cursor:pointer;transition:all .14s}
  .sb-edit:hover{border-color:var(--ink-faint);color:var(--ink)}
  .sb-edit.on{background:var(--excel);color:#fff;border-color:var(--excel)}
  .sb-hint{font-size:11px;color:var(--ink-faint);font-weight:600;padding:0 10px 8px;line-height:1.5}
  .mt-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .reorder{display:inline-flex;gap:3px;margin-left:auto}
  .rb{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);width:22px;height:20px;border-radius:5px;font-size:8px;cursor:pointer;display:grid;place-items:center;line-height:1;padding:0}
  .rb:hover{border-color:var(--excel);color:var(--excel)}
  .sb-label{display:flex;align-items:center}
  .sidebar.editing .modetab{cursor:default;background:#FAFBFD}
  .sidebar.editing .modetab.active{background:color-mix(in srgb,var(--g) 13%,#fff)}
  /* アクセス数バッジ */
  .ac{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 13px;box-shadow:var(--shadow)}

  .content{padding:24px clamp(16px,3.5vw,30px) 70px;min-width:0;max-width:1120px}
  .ctop{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:4px}
  .ctop-title{font-size:25px;font-weight:900;letter-spacing:-.01em}
  .ctop-sub{font-size:15px;color:var(--ink-soft);font-weight:600;margin-top:2px}
  .ctop-clock{position:fixed;top:0;right:22px;height:56px;z-index:131;display:flex;align-items:center;gap:10px;background:transparent;border:none;box-shadow:none;font-family:var(--mono);white-space:nowrap}
  .cc-dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.5);animation:ccpulse 2s infinite;flex:0 0 auto}
  @keyframes ccpulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.5)}70%{box-shadow:0 0 0 7px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
  .cc-date{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.82)}
  .cc-date .nb-wd{color:rgba(255,255,255,.6);margin-left:3px;font-weight:600}
  .cc-time{font-size:14px;font-weight:700;color:#fff}
  .cc-time .nb-sec{color:rgba(255,255,255,.62);font-size:12px;font-weight:500}
  .cc-sep{color:rgba(255,255,255,.5)}
  .cc-ac{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.9)}
  .cc-ac b{color:#fff;margin-right:4px}
  @media(max-width:900px){
    .ctop-clock{top:0;right:12px;height:52px;gap:7px;padding:0;z-index:45}
    .cc-date,.cc-sep{display:none}
    .cc-time{font-size:12.5px}.cc-ac{font-size:11.5px}
  }

  @media(max-width:900px){
    .topbar{display:none}
    .mtopbar{display:flex;background:linear-gradient(135deg,#004bad 0%,#003e92 55%,#003479 100%);border-bottom:none;box-shadow:0 2px 12px -5px rgba(0,52,121,.5)}
    .mtopbar .mburger span{background:#fff}
    .mtopbar .mtop-brand{color:#fff}
    .mtopbar .mtop-mark{background:rgba(255,255,255,.2);color:#fff}
    .appshell{padding-left:0;padding-top:0}
    .content{padding:64px 16px 80px}
    .ctop-title{font-size:21px}
    .sidebar{position:fixed;top:0;left:0;height:100%;width:286px;max-width:84vw;z-index:120;
      transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
      border-right:1px solid var(--line);box-shadow:24px 0 60px -24px rgba(15,20,28,.45);
      overflow-y:auto;background:var(--card);padding:18px 16px 24px}
    body.drawer-open .sidebar{transform:none}
    .sb-close{display:grid}
    .mbackdrop{display:block}
    .sb-brand{padding:2px 4px 18px}
  }

  .platwrap{display:none;justify-content:flex-start;margin-top:14px}
  .platwrap.show{display:flex}
  .platseg{display:inline-flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .platseg button{border:none;background:transparent;font-family:var(--sans);font-weight:700;font-size:12.5px;color:var(--ink-soft);padding:7px 18px;cursor:pointer;transition:all .14s}
  .platseg button.active{background:var(--ink);color:#fff}

  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start;margin-top:16px}
  .chip{font-family:var(--sans);font-size:14px;font-weight:700;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);padding:9px 16px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint)}
  .chip:hover{border-color:var(--ink-faint);color:var(--ink)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.active .dot{background:#fff}

  .meta{display:flex;align-items:baseline;justify-content:space-between;margin:30px 4px 16px;gap:12px;flex-wrap:wrap}
  .meta .label{font-family:var(--sans);font-size:15px;font-weight:800;color:var(--excel);border-left:4px solid var(--excel);padding-left:10px;letter-spacing:.02em}
  .meta .count{font-size:13px;color:var(--ink-soft);font-weight:600}
  .meta .count b{color:var(--excel)}
  .meta-right{display:flex;align-items:center;gap:12px}
  .sortctl{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px}
  .sortctl button{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink-soft);background:transparent;border:none;border-radius:6px;padding:6px 13px;cursor:pointer;transition:all .14s}
  .sortctl button.on{background:var(--card);color:var(--excel);box-shadow:0 1px 2px rgba(20,24,33,.08)}

  .answer{margin-bottom:30px}
  .intent{margin:2px 0 20px;padding:14px 16px;border-radius:12px;background:var(--accent-wash,#e3f4f2);border:1px solid color-mix(in srgb,var(--accent,#0d9488) 26%,#fff)}
  .intent-h{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--accent,#0d9488);line-height:1.5}
  .intent-ic{font-size:15px;flex:0 0 auto}
  .intent-fns{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .intent-fn{font-family:var(--mono);font-weight:700;font-size:13.5px;color:#fff;background:var(--accent,#0d9488);border:none;border-radius:8px;padding:7px 13px;cursor:pointer;transition:background .14s,transform .14s}
  .intent-fn:hover{background:var(--accent-bright,#13b3a4);transform:translateY(-1px)}
  .intent-tip{margin-top:10px;font-size:12.5px;font-weight:600;color:#2c6b64;line-height:1.55}
  .answer .ans-eyebrow{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--excel);margin:0 4px 10px;display:flex;align-items:center;gap:8px}
  .answer .ans-eyebrow::before{content:"";width:20px;height:2px;background:var(--excel)}
  .selected-cell{position:relative}
  .selected-cell .card{border:2px solid var(--select);box-shadow:0 0 0 4px rgba(0,75,173,.12), var(--shadow)}
  .selected-cell::after{content:"";position:absolute;right:-5px;bottom:-5px;width:11px;height:11px;background:var(--select);border:2px solid var(--card);border-radius:2px}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}

  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 20px 18px;box-shadow:var(--shadow);border-top:3px solid var(--cat,var(--excel));transition:transform .14s,box-shadow .14s}
  .fav-star{position:absolute;top:12px;right:12px;z-index:2;width:28px;height:28px;border:none;background:transparent;color:var(--ink-faint);font-size:17px;line-height:1;cursor:pointer;border-radius:8px;opacity:.4;transition:opacity .14s,color .14s,transform .14s;display:flex;align-items:center;justify-content:center}
  .fav-star:hover{opacity:1;background:color-mix(in srgb,var(--excel) 9%,#fff);transform:scale(1.1)}
  .fav-star.on{color:#f5a623;opacity:1}
  .card:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(27,36,32,.04),0 14px 30px -14px rgba(27,36,32,.26)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;padding-right:30px}
  .fn-name{font-family:var(--mono);font-weight:700;font-size:23px;letter-spacing:-.01em;color:var(--ink)}
  .fn-read{font-size:13.5px;color:var(--ink-faint);font-weight:500;margin-top:1px}
  .sc-action{font-family:var(--sans);font-weight:900;font-size:19px;color:var(--ink);line-height:1.3}
  .cat-tag{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:6px;white-space:nowrap;background:var(--cat-wash,var(--excel-wash));color:var(--cat,var(--excel))}
  .fn-desc{font-size:15.5px;color:var(--ink-soft);font-weight:500;margin:10px 0 14px;line-height:1.75}

  .syntax{font-family:var(--mono);font-size:12.5px;color:var(--ink);background:#f3f5fb;border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:12px;line-height:1.55;word-break:break-word}
  .syntax .arg{color:var(--cat,var(--excel));font-weight:500}
  .example{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .ex-cell{font-family:var(--mono);font-size:12.5px;font-weight:500;border:1px solid var(--grid);background:#fff;border-radius:6px;padding:7px 10px;color:var(--ink);position:relative;cursor:pointer;transition:background .12s,border-color .12s}
  .ex-cell.formula:hover{background:var(--excel-wash);border-color:var(--excel-bright)}
  .ex-cell.formula::after{content:"コピー";position:absolute;top:-9px;right:6px;font-family:var(--sans);font-size:9px;font-weight:700;color:var(--excel);background:var(--card);padding:0 4px;opacity:0;transition:opacity .12s}
  .ex-cell.formula:hover::after{opacity:1}
  .ex-cell.copied::after{content:"コピーしました";opacity:1;color:var(--excel)}
  .ex-cell.result{background:var(--excel-wash);border-color:#c5d2f0;color:var(--excel);font-weight:700}
  .ex-arrow{color:var(--ink-faint);font-weight:700;font-family:var(--mono)}
  .ex-note{font-size:12px;color:var(--ink-faint);margin-top:9px;font-weight:500}

  /* keycaps */
  .kcombo{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:14px 0 12px}
  .kbd{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);background:linear-gradient(180deg,#fff,#EFF2EF);border:1.5px solid var(--grid);border-bottom-width:3px;border-radius:8px;min-width:34px;padding:8px 11px;text-align:center;line-height:1}
  .kplus{color:var(--ink-faint);font-weight:700;font-family:var(--mono);font-size:13px}
  .sc-note{font-size:11.5px;color:var(--ink-faint);margin-top:2px;font-weight:500}
  /* UIパーツ */
  .ui-en{font-family:var(--mono);font-size:12px;color:var(--ink-faint);font-weight:500;margin-top:2px}
  .ui-ico{display:flex;align-items:center;justify-content:center;height:78px;background:#f3f5fb;border:1px solid var(--line);border-radius:10px;margin:13px 0;color:var(--cat,var(--excel))}
  .ui-when{font-size:14.5px;line-height:1.6;color:var(--ink-soft);margin-top:10px}
  .ui-when-l{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--cat,var(--excel));background:color-mix(in srgb,var(--cat,var(--excel)) 11%,#fff);border-radius:5px;padding:2px 7px;margin-right:7px;vertical-align:1px}
  .ui-ico svg{width:84px;height:56px}

  /* 文字（手書き・読み）*/
  .modetab{white-space:nowrap}
  .charpanel{display:none}
  .hw{display:flex;gap:16px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);flex-wrap:wrap}
  #hwcanvas{width:240px;max-width:100%;aspect-ratio:1/1;height:auto;touch-action:none;background:#fff;border:1.5px dashed var(--grid);border-radius:12px;cursor:crosshair;background-image:linear-gradient(var(--grid-soft) 1px,transparent 1px),linear-gradient(90deg,var(--grid-soft) 1px,transparent 1px);background-size:120px 120px;background-position:center}
  .hw-side{flex:1;min-width:160px;display:flex;flex-direction:column;gap:9px;justify-content:center}
  .hw-side h4{font-size:14px;font-weight:900;color:var(--ink)}
  .hw-side p{font-size:12px;color:var(--ink-faint);font-weight:500;line-height:1.6}
  .hw-btns{display:flex;gap:8px;flex-wrap:wrap}
  .hw-btn{font-family:var(--sans);font-weight:700;font-size:13.5px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);padding:9px 16px;border-radius:9px;cursor:pointer;transition:all .14s}
  .hw-btn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .hw-btn.primary{background:var(--excel);color:#fff;border-color:var(--excel)}
  .hw-btn.primary:hover{background:#0a2069;color:#fff}
  .candidates{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:14px 0 4px}
  .cand-label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);width:100%}
  .cand{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:24px;line-height:1;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;cursor:pointer;transition:all .13s}
  .cand:hover{border-color:var(--excel);background:var(--excel-wash);transform:translateY(-1px)}
  .cand-msg{font-size:13px;color:var(--ink-soft);font-weight:500;margin:12px 0}
  .cand-msg.err{color:#C53030}
  #chardetail{margin-top:8px}
  .char-card{background:var(--card);border:1.5px solid var(--line);border-left:4px solid var(--excel);border-radius:14px;padding:22px;box-shadow:var(--shadow)}
  .char-head{display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}
  .char-glyph{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:74px;line-height:.95;font-weight:500;color:var(--ink)}
  .char-stats{display:flex;flex-wrap:wrap;gap:8px}
  .char-stats span{font-size:12px;font-weight:700;color:var(--ink-soft);background:#f3f5fb;border:1px solid var(--line);border-radius:6px;padding:5px 10px}
  .yomi{display:flex;flex-direction:column;gap:14px}
  .yomi-row{display:flex;gap:16px;align-items:baseline}
  .yomi-label{flex:0 0 52px;font-size:13px;font-weight:900;color:var(--ink)}
  .yomi-vals{display:flex;flex-wrap:wrap;gap:8px}
  .yomi-chip{font-size:17px;font-weight:700;padding:5px 12px;border-radius:8px}
  .yomi-chip.on{background:var(--excel-wash);color:var(--excel)}
  .yomi-chip.kun{background:#F0EAFA;color:#6B46C1}
  .yomi-none{color:var(--ink-faint);font-size:15px}
  .char-mean{margin-top:16px;font-size:13.5px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:14px;line-height:1.7}
  .char-mean b{color:var(--ink);margin-right:8px;font-weight:700}
  .char-note{font-size:11.5px;color:var(--ink-faint);margin-top:12px;line-height:1.6}
  .char-msg{padding:34px 20px;text-align:center;color:var(--ink-soft);background:var(--card);border:1.5px dashed var(--line);border-radius:14px;font-size:14px}
  .char-msg.err{color:#9B2C2C;border-color:#E8C9C9}
  .rr-label{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px}
  .rr-chips{display:flex;flex-wrap:wrap;gap:8px}
  .rr-chip{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:22px;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;cursor:pointer;transition:all .13s}
  .rr-chip:hover{border-color:var(--excel);background:var(--excel-wash)}

  /* 広告スロット */
  .ad-tag{position:absolute;top:9px;right:11px;font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;color:#9A7B2E;background:#FBF3DE;border:1px solid #ECDCB2;border-radius:5px;padding:2px 7px;z-index:2}
  .ad-banner{position:relative;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px dashed var(--line);border-radius:13px;min-height:96px;margin:18px 0;box-shadow:var(--shadow)}
  .ad-banner-inner{color:var(--ink-faint);font-size:13px;font-weight:700;text-align:center;line-height:1.7}
  .ad-mini{font-weight:500;font-size:11px}
  .ad-card{position:relative;display:flex;align-items:center;justify-content:center;min-height:150px;background:#FCFAF4;border:1.5px dashed #E6DCBF;border-left:4px solid #E3C770;box-shadow:var(--shadow)}
  .ad-card:hover{transform:none;box-shadow:var(--shadow)}
  .ad-body{text-align:center;color:var(--ink-faint)}
  .ad-body .ad-ico{font-size:26px;color:#D8C176;margin-bottom:6px;font-family:var(--mono)}
  .ad-body p{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .ad-body .ad-mini{display:block;margin-top:4px}
  .ad-anchor{display:none}
  .ad-anchor-close{position:absolute;top:3px;right:9px;border:none;background:transparent;font-size:19px;line-height:1;color:var(--ink-faint);cursor:pointer;z-index:3}
  @media(max-width:680px){
    .ad-anchor.show{display:flex;align-items:center;justify-content:center;position:fixed;left:0;right:0;bottom:0;z-index:60;min-height:58px;background:var(--card);border-top:1.5px solid var(--line);box-shadow:0 -6px 20px -10px rgba(27,36,32,.25)}
    body.has-anchor{padding-bottom:66px}
  }

  .empty{text-align:center;padding:56px 20px;color:var(--ink-soft);background:var(--card);border:1.5px dashed var(--line);border-radius:14px}
  .empty .big{font-family:var(--mono);font-size:34px;color:var(--ink-faint);margin-bottom:14px}
  .empty h3{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .empty p{font-size:14px;max-width:380px;margin:0 auto 16px}
  .empty .sugg{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .guide{position:relative;background:var(--card);border:1.5px solid color-mix(in srgb,var(--excel) 25%,#fff);border-radius:14px;padding:18px 44px 16px 20px;margin:4px 0 18px;box-shadow:var(--shadow)}
  .guide-t{font-size:16.5px;font-weight:800;color:var(--excel);margin-bottom:8px}
  .guide-steps{margin:0;padding-left:1.3em;font-size:15.5px;line-height:2;color:var(--ink)}
  .guide-ex{font-family:var(--sans);font-size:14px;font-weight:800;color:var(--excel);background:var(--excel-wash);border:1.5px solid color-mix(in srgb,var(--excel) 30%,#fff);border-radius:8px;padding:3px 12px;cursor:pointer}
  .guide-ex:hover{background:var(--excel);color:#fff}
  .guide-x{position:absolute;top:10px;right:10px;width:32px;height:32px;border:none;background:transparent;color:var(--ink-faint);font-size:20px;cursor:pointer;border-radius:8px}
  .guide-x:hover{background:var(--paper);color:var(--ink)}
  .empty .sugg button{font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);padding:6px 13px;border-radius:999px;transition:all .14s}
  .empty .sugg button:hover{border-color:var(--excel);color:var(--excel)}
  .didyou{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin:0 auto 18px;max-width:460px}
  .didyou-l{font-size:12.5px;font-weight:700;color:var(--ink-faint)}
  .didyou-b{font-family:var(--mono);font-size:13.5px;font-weight:700;cursor:pointer;border:1.5px solid color-mix(in srgb,var(--excel) 35%,#fff);background:var(--excel-wash);color:var(--excel);padding:6px 13px;border-radius:8px;transition:all .14s}
  .didyou-b:hover{background:var(--excel);color:#fff}

  footer{text-align:center;margin-top:48px;color:var(--ink-faint);font-size:12px;line-height:1.7}
  .subly-banner{display:flex;align-items:center;gap:15px;max-width:640px;margin:18px auto;background:var(--accent,#0d9488);border-radius:14px;padding:16px 18px;text-decoration:none;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s}
  .subly-banner:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(13,110,86,.28)}
  .syb-ico{flex:0 0 auto;width:50px;height:50px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--accent,#0d9488)}
  .syb-txt{flex:1 1 200px;min-width:0}
  .syb-head{display:flex;align-items:center;flex-wrap:wrap;gap:7px;font-size:15.5px;font-weight:800;color:#fff;line-height:1.4}
  .syb-tag{font-size:10px;font-weight:700;color:#d3efe8;border:1px solid rgba(255,255,255,.4);border-radius:5px;padding:1px 6px}
  .syb-sub{display:block;margin-top:3px;font-size:12.5px;line-height:1.6;color:#e3f4f2}
  .syb-cta{flex:0 0 auto;background:#fff;color:#0d6e56;font-size:13.5px;font-weight:800;padding:10px 16px;border-radius:10px;white-space:nowrap}
  @media(max-width:560px){.subly-banner{flex-wrap:wrap}.syb-cta{width:100%;text-align:center}}
  .foot-links{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin:14px 0 6px}
  .foot-links a{color:var(--ink-soft);text-decoration:none;font-weight:600;font-size:12.5px}
  .foot-links a:hover{color:var(--excel);text-decoration:underline}
  .foot-copy{margin-top:6px;font-size:11.5px;color:var(--ink-faint)}
  footer .fxmini{font-family:var(--mono);font-style:italic;color:var(--excel);font-weight:700}

  /* よく使う（履歴）バー */
  .recentbar{max-width:640px;margin:0 auto;padding:10px 2px 0}
  .rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .rc-title{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .rc-clear{font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--ink-faint);background:none;border:none;cursor:pointer;padding:2px}
  .rc-clear:hover{color:var(--excel);text-decoration:underline}
  .rc-chips{display:flex;flex-wrap:wrap;gap:7px}
  .rc-chip{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-weight:700;font-size:13px;color:var(--ink-soft);background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 13px 6px 8px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow)}
  .rc-chip:hover{border-color:var(--excel);color:var(--ink);transform:translateY(-1px)}
  .rc-mk{font-family:var(--mono);font-size:10.5px;font-weight:700;color:#fff;background:var(--excel);min-width:18px;height:18px;border-radius:5px;display:inline-grid;place-items:center;line-height:1}

  /* 敬語・言い換え */
  .kg-scene{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:3px 10px;white-space:nowrap}
  .kg-label{font-size:11.5px;font-weight:700;color:var(--ink-faint);margin:12px 0 8px}
  .kg-polite{display:flex;flex-wrap:wrap;gap:8px}
  .kg-chip{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--excel);background:var(--excel-wash);border:1.5px solid #c5d2f0;border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .14s}
  .kg-chip:hover{border-color:var(--excel);transform:translateY(-1px)}
  .kg-chip.copied{background:var(--excel);color:#fff;border-color:var(--excel)}

  /* サブスク管理 */
  .subpanel{display:none}
  .sub-card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .sub-summary{margin-bottom:14px}
  .sub-intro{padding:18px;font-size:14px;color:var(--ink-soft);line-height:1.75}
  .sub-sum{padding:18px}
  .sum-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .sum-big{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--excel);line-height:1}
  .sum-label{font-size:12px;color:var(--ink-faint);font-weight:600;margin-top:5px}
  .sum-side{font-size:13px;color:var(--ink-soft);text-align:right;line-height:1.7}
  .sum-side b{color:var(--ink);font-family:var(--mono)}
  .sc-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
  .sc-row{display:flex;align-items:center;gap:10px;font-size:12.5px}
  .sc-name{display:flex;align-items:center;gap:6px;min-width:72px;color:var(--ink-soft);font-weight:600}
  .sc-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .sc-bar{flex:1;height:8px;background:var(--paper);border-radius:5px;overflow:hidden}
  .sc-bar>span{display:block;height:100%;border-radius:5px}
  .sc-val{font-family:var(--mono);font-size:12px;color:var(--ink);min-width:62px;text-align:right}
  .sub-review{margin-top:14px;padding:10px 13px;background:#FFF6EC;border:1px solid #F4D4A8;border-radius:10px;font-size:12.5px;color:#7A4E12}
  .sub-review b{color:#B5660A}
  .sub-form{padding:14px}
  .sub-form-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .sub-in{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;outline:none}
  .sub-in:focus{border-color:var(--excel)}
  #subName{flex:1 1 150px;min-width:120px}
  .sub-amt{display:flex;align-items:center;gap:2px;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:0 4px 0 11px}
  .sub-amt:focus-within{border-color:var(--excel)}
  .sub-yen{color:var(--ink-faint);font-weight:700}
  #subAmount{border:none;background:transparent;width:86px;padding:9px 6px}
  .sub-seg{display:inline-flex;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
  .sub-seg button{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--ink-faint);background:none;border:none;padding:9px 13px;cursor:pointer}
  .sub-seg button.active{background:var(--excel);color:#fff}
  .sub-sel{cursor:pointer}
  .sub-date{color:var(--ink-soft)}
  .sub-add{font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;background:var(--excel);border:none;border-radius:10px;padding:10px 22px;cursor:pointer;box-shadow:0 6px 14px -6px rgba(15,49,146,.55)}
  .sub-add:hover{filter:brightness(1.06)}
  .sub-cancel{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-faint);background:none;border:1.5px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer}
  .sub-presets{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}

function intentMatch(q){
  q=norm(q); if(q.length<2) return {fns:[],tip:''};
  const scored=[];
  INTENTS.forEach(it=>{
    let hit=0; it.t.forEach(tr=>{ const k=norm(tr); if(k&&(q.includes(k)||(k.length>=2&&k.includes(q)))) hit++; });
    if(hit) scored.push({it,hit});
  });
  if(!scored.length) return {fns:[],tip:''};
  scored.sort((a,b)=>b.hit-a.hit);
  const fns=[]; scored.forEach(s=>s.it.f.forEach(f=>{ if(!fns.includes(f)) fns.push(f); }));
  return {fns:fns.slice(0,6), tip:scored[0].it.tip};
}
function intentHTML(q, m){
  if(!m.fns.length) return '';
  const chips=m.fns.map(n=>`<button class="intent-fn" data-fn="${n}">${n}</button>`).join('');
  return `<div class="intent"><div class="intent-h"><span class="intent-ic">💡</span><span>「${esc(q)}」なら、この関数がおすすめ</span></div>
    <div class="intent-fns">${chips}</div>${m.tip?`<div class="intent-tip">${m.tip}</div>`:''}</div>`;
}
function bindIntent(){
  elAnswer.querySelectorAll('.intent-fn').forEach(b=>b.onclick=()=>{ ga('intent_pick',{fn:b.dataset.fn,from:elQ.value}); elQ.value=b.dataset.fn; activeCat=null; syncChips(); render(); elQ.focus(); });
}

/* 後で各スロットの中身を AdSense 等の広告コードに差し替えてください。
   有効/無効や挿入間隔はここで切り替えられます。 */
const ADS = {
  enabled:true,   // 広告全体のオン/オフ
  top:true,       // 答えの下のバナー
  feed:true,      // 結果一覧に挟むネイティブ枠

function norm(s){return (s||'').toString().toLowerCase().trim();}

function genScore(q, rec){
  if(!q) return 0;
  const name=norm(rec.name), read=norm(rec.read), desc=norm(rec.desc), keys=rec.keys.map(norm);
  let sc=0;
  if(name===q) sc+=1000; else if(name.startsWith(q)) sc+=600; else if(name.includes(q)) sc+=350;
  if(read && (read.includes(q)||(q.length>=2 && q.includes(read)))) sc+=220;
  if(keys.some(k=>k===q)) sc+=420;
  if(keys.some(k=>k.includes(q))) sc+=170;
  if(keys.some(k=>k.length>=2 && q.includes(k))) sc+=230;
  if(desc.includes(q)) sc+=60;
  const toks=q.split(/[\s　+＋]+/).filter(Boolean);
  if(toks.length>1){
    toks.forEach(t=>{
      if(name.includes(t)) sc+=90;
      if(read.includes(t)) sc+=50;
      if(keys.some(k=>k===t)) sc+=140;
      if(keys.some(k=>k.includes(t)||(k.length>=2 && t.includes(k)))) sc+=85;
      if(desc.includes(t)) sc+=30;
    });
  }
  return sc;
}

/* ============ もしかして（あいまい候補）============ */
function bigrams(s){ s=norm(s); const g=[]; for(let i=0;i<s.length-1;i++) g.push(s.slice(i,i+2)); return g; }
function simRatio(a,b){ const A=bigrams(a), B=bigrams(b); if(!A.length||!B.length) return 0;
  const m={}; B.forEach(g=>m[g]=(m[g]||0)+1); let inter=0;
  A.forEach(g=>{ if(m[g]>0){ inter++; m[g]--; } });
  return (2*inter)/(A.length+B.length); }
function fuzzySuggest(q, data, recOf){
  q=norm(q); if(q.length<2) return [];
  const scored=data.map(it=>{ const r=recOf(it);
    const cands=[r.name, r.read].concat(r.keys||[]).filter(Boolean);
    let best=0; cands.forEach(c=>{ const s=simRatio(q,c); if(s>best) best=s; });
    return {it, s:best}; }).filter(x=>x.s>=0.34).sort((a,b)=>b.s-a.s);
  return scored.slice(0,4).map(x=>x.it); }

function render(){
  const q=norm(elQ.value);
  elClear.classList.toggle('show', !!elQ.value);
  clearTimeout(heroLogTimer);
  updateRecentVisibility();
  const cfg=MODES[mode];
  const data=cfg.data, recOf=cfg.rec, cardOf=cfg.card, cats=cfg.cats;

  let list=data.map(it=>({it, sc:genScore(q, recOf(it))}));
  if(activeCat) list=list.filter(x=>x.it.c===activeCat);
  if(q) list=list.filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc);
  if(elSortCtl) elSortCtl.hidden = !(mode==='fn' && !q);
  if(mode==='fn' && !q && fnSort!=='def'){
    list.sort((a,b)=> fnSort==='abc' ? a.it.n.localeCompare(b.it.n) : (a.it.r||'').localeCompare(b.it.r||'','ja'));
  }

  if(q) elMetaLabel.textContent='検索結果';
  else if(activeCat) elMetaLabel.textContent=cats[activeCat].ja+cfg.catSuffix;
  else elMetaLabel.textContent=cfg.listLabel;
  elCount.innerHTML = list.length?`<b>${list.length}</b> 件`:'';
  if(q) trackSearch(q, mode, list.length);

  elAnswer.innerHTML='';
  const topHTML = (mode==='fn' && q) ? intentHTML(q, intentMatch(q)) : '';
  const guideHTML = (!q && guideVisible()) ? simpleGuideHTML() : '';
  let rest=list, ansItem=null;
  if(q && list.length && list[0].sc>=300){
    ansItem=list[0].it;
    elAnswer.innerHTML=topHTML+`<div class="answer"><div class="ans-eyebrow">いちばん近い答え</div><div class="selected-cell">${cardOf(list[0].it)}</div></div>`;
    rest=list.slice(1);
    scheduleHeroLog(mode, list[0].it);
  } else {
    elAnswer.innerHTML=guideHTML+topHTML;
  }
  if(topHTML) bindIntent();
  if(guideHTML) bindGuide();
  applyMetaFor(mode, ansItem); routeWrite();

  if(!list.length){
    const did=fuzzySuggest(q, data, recOf);
    const didHTML=did.length?`<div class="didyou"><span class="didyou-l">もしかして</span>${did.map(it=>`<button class="didyou-b" data-s="${esc(recOf(it).name)}">${esc(recOf(it).name)}</button>`).join('')}</div>`:'';
    elResults.innerHTML=`<div class="empty"><div class="big">=?</div>
      <h3>見つかりませんでした</h3>
      <p>${cfg.emptyHint}</p>${didHTML}
      <div class="sugg">${cfg.suggest.map(s=>`<button data-s="${s[0]}">${s[1]}</button>`).join('')}</div></div>`;
    elResults.querySelectorAll('.didyou-b,.sugg button').forEach(b=>b.onclick=()=>{elQ.value=b.dataset.s;activeCat=null;syncChips();render();elQ.focus();});
    return;
  }
  elResults.innerHTML=withFeedAds(rest.map(x=>cardOf(x.it)));
  if(mode==='fn') bindCopy(); else if(mode==='keigo') bindCopySel('.kg-chip');
  decorateFavs(elAnswer); decorateFavs(elResults); renderFav();
}

function adCardHTML(){

    <div class="ad-body"><div class="ad-ico">▦</div><p>広告スペース</p><span class="ad-mini">ネイティブ / レスポンシブ</span></div>
    <!-- 広告コードをここに挿入（例：AdSense のネイティブ広告ユニット） -->
  </div>`;
}
function withFeedAds(cards){
  if(!(ADS.enabled&&ADS.feed) || cards.length<=ADS.feedStart) return cards.join('');
  const out=[];
  cards.forEach((c,i)=>{
    out.push(c);
    const pos=i+1;
    if(pos>=ADS.feedStart && (pos-ADS.feedStart)%ADS.feedEvery===0 && pos!==cards.length) out.push(adCardHTML());
  });
  return out.join('');
}

function subSetRating(id,r){ const a=subsLoad(); const it=a.find(x=>x.id===id); if(it){ it.rating=(it.rating===r?0:r); subsSave(a); renderSubs(); } }

/* ============ 割り勘・立替の精算（アカウント不要・このブラウザに保存）============ */
const WARI_KEY='nanikore_wari_v1';
const wariPanel=document.getElementById('waripanel');
const wEl={};
['wariName','wariAddMember','wariChips','wariTitle','wariAmount','wariPayer','wariAdd','wariParts','wariResult','wariList','wariForm'].forEach(id=>wEl[id]=document.getElementById(id));
let wariSel={};
function wariLoad(){ try{ const d=JSON.parse(localStorage.getItem(WARI_KEY)); if(d&&Array.isArray(d.members)&&Array.isArray(d.items)) return d; }catch(e){} return {members:[],items:[]}; }
function wariSave(d){ try{ localStorage.setItem(WARI_KEY, JSON.stringify(d)); }catch(e){} }
function wUID(){ return 'w'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function wmName(d,id){ const m=d.members.find(x=>x.id===id); return m?m.name:'?'; }
function wAddMember(){
  const name=wEl.wariName.value.trim(); if(!name){ wEl.wariName.focus(); return; }
  const d=wariLoad(); d.members.push({id:wUID(),name}); wariSave(d);
  wEl.wariName.value=''; wariSel={}; renderWari(); wEl.wariName.focus();
}
function wRemoveMember(id){
  const dm=wariLoad(); const m=dm.members.find(x=>x.id===id); const nm=m?m.name:'このメンバー';
  confirmModal({title:'メンバーを削除しますか？', body:`「${esc(nm)}」を削除すると、その人が立替えた記録も一緒に消えます。この操作は取り消せません。`, okLabel:'削除する', danger:true, onOk:()=>{
    const d=wariLoad();
    d.members=d.members.filter(mm=>mm.id!==id);
    d.items=d.items.filter(it=>it.payer!==id).map(it=>({...it,parts:it.parts.filter(p=>p!==id)})).filter(it=>it.parts.length>0);
    wariSave(d); wariSel={}; renderWari();
  }});
}
function wAddItem(){
  const d=wariLoad();
  const title=wEl.wariTitle.value.trim()||'立替え';
  const amount=Math.round(parseFloat(wEl.wariAmount.value));
  if(isNaN(amount)||amount<=0){ wEl.wariAmount.focus(); return; }
  const payer=wEl.wariPayer.value; if(!payer) return;
  const parts=d.members.map(m=>m.id).filter(id=>wariSel[id]!==false);
  if(!parts.length) return;
  d.items.push({id:wUID(),title,amount,payer,parts}); wariSave(d); ga('wari_add',{amount:amount});
  wEl.wariTitle.value=''; wEl.wariAmount.value=''; renderWari(); wEl.wariTitle.focus();
}
function wDelItem(id){ const d=wariLoad(); d.items=d.items.filter(it=>it.id!==id); wariSave(d); renderWari(); }
function wSettle(d){
  const net={}; d.members.forEach(m=>net[m.id]=0);
  d.items.forEach(it=>{
    if(net[it.payer]!==undefined) net[it.payer]+=it.amount;
    const share=it.amount/it.parts.length;
    it.parts.forEach(p=>{ if(net[p]!==undefined) net[p]-=share; });
  });
  const debt=[], cred=[];
  d.members.forEach(m=>{ const v=net[m.id]; if(v<-0.5) debt.push({id:m.id,amt:-v}); else if(v>0.5) cred.push({id:m.id,amt:v}); });
  debt.sort((a,b)=>b.amt-a.amt); cred.sort((a,b)=>b.amt-a.amt);
  const tx=[]; let i=0,j=0;
  while(i<debt.length&&j<cred.length){
    const pay=Math.min(debt[i].amt,cred[j].amt);
    tx.push({from:debt[i].id,to:cred[j].id,amount:Math.round(pay)});
    debt[i].amt-=pay; cred[j].amt-=pay;
    if(debt[i].amt<=0.5) i++; if(cred[j].amt<=0.5) j++;
  }
  return {net, tx:tx.filter(t=>t.amount>0)};
}
function renderWari(){
  const d=wariLoad();
  wEl.wariChips.innerHTML=d.members.length? d.members.map(m=>`<span class="wari-chip">${esc(m.name)}<button class="wari-x" data-id="${m.id}" aria-label="削除">×</button></span>`).join('') : `<span class="wari-empty">まずは割り勘するメンバーを2人以上追加してください。</span>`;
  wEl.wariChips.querySelectorAll('.wari-x').forEach(b=>b.onclick=()=>wRemoveMember(b.dataset.id));
  wEl.wariPayer.innerHTML=d.members.map(m=>`<option value="${m.id}">${esc(m.name)}が立替</option>`).join('');
  wEl.wariParts.innerHTML=d.members.map(m=>`<button type="button" class="wp-part ${wariSel[m.id]!==false?'on':''}" data-id="${m.id}">${esc(m.name)}</button>`).join('');
  wEl.wariParts.querySelectorAll('.wp-part').forEach(b=>b.onclick=()=>{ const id=b.dataset.id; const sel=wariSel[id]!==false; wariSel[id]=!sel; b.classList.toggle('on',!sel); });
  const ready=d.members.length>=2;
  wEl.wariForm.style.opacity=ready?'1':'.45';
  wEl.wariForm.style.pointerEvents=ready?'':'none';
  if(ready && d.items.length){
    const {net,tx}=wSettle(d);
    const total=d.items.reduce((s,x)=>s+x.amount,0);
    const bal=d.members.map(m=>{ const v=Math.round(net[m.id]); return `<div class="wb-row"><span class="wb-name">${esc(m.name)}</span><span class="wb-val ${v>0?'plus':(v<0?'minus':'')}">${v>0?'+':''}${yen(v)}</span></div>`; }).join('');
    const txh=tx.length? tx.map(t=>`<div class="wt-row"><span class="wt-from">${esc(wmName(d,t.from))}</span><span class="wt-arrow">→</span><span class="wt-to">${esc(wmName(d,t.to))}</span><span class="wt-amt">${yen(t.amount)}</span></div>`).join('') : `<div class="wari-done">精算の必要はありません 🎉</div>`;
    wEl.wariResult.innerHTML=`<div class="sub-card wari-sum">
      <div class="sum-top"><div><div class="sum-big">${yen(total)}</div><div class="sum-label">立替え合計 ・ ${d.items.length}件</div></div></div>
      <div class="wari-block-label">各メンバーの収支（＋は受け取り／−は支払い）</div>
      <div class="wb-list">${bal}</div>
      <div class="wari-block-label">精算方法（誰が誰にいくら払う）</div>
      <div class="wt-list">${txh}</div>
    </div>`;
  } else { wEl.wariResult.innerHTML=''; }
  wEl.wariList.innerHTML=d.items.slice().reverse().map(it=>`<div class="sub-card sub-item wari-item">
      <div class="si-main"><div class="si-name">${esc(it.title)} <span class="wari-cat">${esc(wmName(d,it.payer))}が立替</span></div>
      <div class="si-cost"><b>${yen(it.amount)}</b><span class="si-cyc">${it.parts.length}人で割る</span></div></div>
      <div class="si-acts"><button class="si-del" data-id="${it.id}">削除</button></div>
    </div>`).join('');
  wEl.wariList.querySelectorAll('.si-del').forEach(b=>b.onclick=()=>wDelItem(b.dataset.id));
}
function initWari(){
  if(!wariPanel) return;
  wEl.wariAddMember.onclick=wAddMember;
  wEl.wariAdd.onclick=wAddItem;
  wEl.wariName.addEventListener('keydown',e=>{ if(e.key==='Enter') wAddMember(); });
  wEl.wariTitle.addEventListener('keydown',e=>{ if(e.key==='Enter') wEl.wariAmount.focus(); });
  wEl.wariAmount.addEventListener('keydown',e=>{ if(e.key==='Enter') wAddItem(); });
}

function buildChips(){
  const cats = MODES[mode].cats;
  elChips.innerHTML='';
  Object.keys(cats).forEach(key=>{
    const c=cats[key];
    const chip=document.createElement('button');
    chip.className='chip'; chip.dataset.cat=key;
    chip.innerHTML=`<span class="dot" style="background:var(${c.v})"></span>${c.ja}`;
    chip.onclick=()=>{activeCat=(activeCat===key)?null:key;syncChips();render();document.querySelector('.meta').scrollIntoView({behavior:'smooth',block:'start'});};
    elChips.appendChild(chip);
  });
}
function syncChips(){[...elChips.children].forEach(c=>c.classList.toggle('active',c.dataset.cat===activeCat));}

function setMode(m){
  if(mode===m) return;
  mode=m; activeCat=null; elQ.value='';
  ga('mode_switch',{tool:m});
  const cfg=MODES[m];
  document.querySelectorAll('.modetab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  elPlat.classList.toggle('show', !!cfg.plat);
  elQ.placeholder=cfg.placeholder;
  elLede.textContent=cfg.lede;
  if(elCtopTitle) elCtopTitle.textContent=MODE_LABELS[m]||'';
  const isChar=(m==='char'), isDict=(m==='dict'), isSub=(m==='sub'), isWari=(m==='wari'), isData=!isChar&&!isDict&&!isSub&&!isWari;
  charPanel.style.display = isChar?'block':'none';
  subPanel.style.display = isSub?'block':'none';
  wariPanel.style.display = isWari?'block':'none';
  searchwrapEl.style.display = (isSub||isWari)?'none':'';
  elChips.style.display = isData?'flex':'none';
  document.querySelector('.meta').style.display = (isChar||isSub||isWari)?'none':'flex';
  elAnswer.style.display = (isChar||isSub||isWari)?'none':'';
  elResults.style.display = (isChar||isSub||isWari)?'none':'';
  if(ADS.enabled&&ADS.top) adTopEl.style.display = (isChar||isSub||isWari)?'none':'block';
  if(isChar){ detailEl.innerHTML=charIntro(); candEl.innerHTML=''; elQ.focus(); }
  else if(isDict){ elAnswer.innerHTML=''; elMetaLabel.textContent='辞書'; elCount.innerHTML=''; dictIntro(); elQ.focus(); }
  else if(isSub){ renderSubs(); }
  else if(isWari){ renderWari(); }
  else { buildChips(); render(); elQ.focus(); }
  if(mode==='char'||mode==='dict'||mode==='sub'||mode==='wari') resetMeta();
  routeWrite();
}

/* ============ メニュー（並べ替え対応・順番を保存）============ */
const ITEMS={
  fn:{icon:'fx',label:'Excelの関数',italic:true},
  sc:{icon:'⌘',label:'ショートカットキー'},
  ui:{icon:'▦',label:'画面の部品の名前'},
  char:{icon:'字',label:'読めない漢字を調べる'},
  dict:{icon:'A',label:'英語⇄日本語 辞書'},
  keigo:{icon:'礼',label:'敬語への言い換え'},
  kata:{icon:'カ',label:'カタカナ語の意味'},
  subly:{icon:'¥',label:'サブスク管理',href:'https://subly.jp/'},
  wari:{icon:'割',label:'割り勘・精算'},
};
let MENU=[
  {id:'excel', label:'Excel', items:['fn','sc']},
  {id:'word',  label:'ことば', items:['char','dict','keigo','kata']},
  {id:'screen',label:'パソコン・画面', items:['ui']},
  {id:'subsc', label:'おかね', items:['subly','wari']},
];
const ORDER_KEY='nanikore_menu_order_v5';
function saveOrder(){ try{ localStorage.setItem(ORDER_KEY, JSON.stringify(MENU.map(g=>({id:g.id,items:g.items})))); }catch(e){} }
function loadOrder(){
  try{
    const raw=localStorage.getItem(ORDER_KEY); if(!raw) return;
    const saved=JSON.parse(raw); if(!Array.isArray(saved)) return;
    const def=Object.fromEntries(MENU.map(g=>[g.id,{id:g.id,label:g.label,items:g.items.slice()}]));
    const used=new Set(), out=[];
    saved.forEach(sg=>{
      const d=def[sg.id]; if(!d) return;
      const items=(sg.items||[]).filter(i=>ITEMS[i]&&!used.has(i)); items.forEach(i=>used.add(i));
      out.push({id:d.id,label:d.label,items}); delete def[sg.id];
    });
    Object.values(def).forEach(d=>{ const items=d.items.filter(i=>!used.has(i)); items.forEach(i=>used.add(i)); out.push({id:d.id,label:d.label,items}); });
    Object.keys(ITEMS).forEach(i=>{ if(used.has(i)) return; const home=MENU.find(g=>g.items.includes(i)); const t=out.find(g=>g.id===(home&&home.id))||out[0]; t.items.push(i); used.add(i); });
    if(out.length) MENU=out;
  }catch(e){}
}
let editMode=false;
const sbEl=document.getElementById('sidebar'), navEl=document.getElementById('modetabs');
const sbEdit=document.getElementById('sbEdit'), sbHint=document.getElementById('sbHint');
const GROUP_COLORS={excel:'#004bad',word:'#2B6CB0',biz:'#B7791F',screen:'#7C5CD6',subsc:'#C0398B'};
function groupColor(id){ return GROUP_COLORS[id]||'#6b7689'; }
function renderNav(){
  navEl.innerHTML=MENU.map((g,gi)=>{
    const items=g.items.map((id,ii)=>{
      const it=ITEMS[id]; if(!it) return '';
      const ic=`<span class="ic"${it.italic?' style="font-style:italic"':''}>${it.icon}</span>`;
      const ctrls=editMode?`<span class="reorder"><button class="rb" data-act="iu" data-g="${gi}" data-i="${ii}" aria-label="上へ">▲</button><button class="rb" data-act="idn" data-g="${gi}" data-i="${ii}" aria-label="下へ">▼</button></span>`:'';
      const cnt={fn:FN.length,sc:SC.length,ui:UI.length,keigo:KEIGO.length,kata:KATAGO.length}[id];
      const badge=(!editMode && cnt!=null)?`<span class="mt-badge">${cnt}</span>`:'';
      return `<button class="modetab ${id===mode?'active':''}" data-mode="${id}"${it.href?` data-href="${it.href}"`:''}>${ic}<span class="mt-label">${it.label}${it.href?' ↗':''}</span>${badge}${ctrls}</button>`;
    }).join('');
    const gc=editMode?`<span class="reorder"><button class="rb" data-act="gu" data-g="${gi}" aria-label="グループを上へ">▲</button><button class="rb" data-act="gdn" data-g="${gi}" aria-label="グループを下へ">▼</button></span>`:'';
    return `<div class="sb-sec" style="--g:${groupColor(g.id)}"><div class="sb-label"><span class="sb-dot"></span>${g.label}${gc}</div>${items}</div>`;
  }).join('');
  navEl.querySelectorAll('.modetab').forEach(t=>t.onclick=()=>{ if(editMode) return; if(t.dataset.href){ ga('outbound_click',{url:t.dataset.href}); window.open(t.dataset.href,'_blank','noopener'); closeDrawer(); return; } setMode(t.dataset.mode); closeDrawer(); });
  navEl.querySelectorAll('.rb').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const a=b.dataset.act, gi=+b.dataset.g, ii=+b.dataset.i;
    if(a==='gu') swapGroup(gi,gi-1); else if(a==='gdn') swapGroup(gi,gi+1);
    else if(a==='iu') swapItem(gi,ii,ii-1); else if(a==='idn') swapItem(gi,ii,ii+1);
  });
}

let _toastEl=null,_toastT=null;

  if(!_toastEl){ _toastEl=document.createElement('div'); _toastEl.className='toast'; _toastEl.setAttribute('role','status'); _toastEl.setAttribute('aria-live','polite'); document.body.appendChild(_toastEl); }

/* 確認モーダル（削除など取り消せない操作の前に確認する小窓） */
function confirmModal({title='確認', body='', okLabel='OK', danger=false, onOk}){
  const back=document.createElement('div'); back.className='modal-back';
  back.setAttribute('role','dialog'); back.setAttribute('aria-modal','true');
  back.innerHTML=`<div class="modal"><div class="modal-title">${title}</div><div class="modal-body">${body}</div>`+
    `<div class="modal-acts"><button class="modal-btn" data-act="cancel">キャンセル</button>`+
    `<button class="modal-btn ${danger?'danger':'primary'}" data-act="ok">${okLabel}</button></div></div>`;
  document.body.appendChild(back);
  const close=()=>{ back.classList.remove('show'); setTimeout(()=>back.remove(),220); document.removeEventListener('keydown',onKey); };
  const onKey=e=>{ if(e.key==='Escape') close(); };
  back.querySelector('[data-act="cancel"]').onclick=close;
  back.querySelector('[data-act="ok"]').onclick=()=>{ close(); try{ onOk&&onOk(); }catch(_){} };
  back.addEventListener('click',e=>{ if(e.target===back) close(); });
  document.addEventListener('keydown',onKey);
  requestAnimationFrame(()=>{ back.classList.add('show'); back.querySelector('[data-act="ok"]').focus(); });
}

/* ============ 現在の利用者数（目安）============ */
/* 注意：これは“正確なリアルタイム同時接続数”ではありません。
   時間帯と、これまでの累計アクセス数をもとに、自然に増減する目安を表示します。
   累計は無料カウンター Abacus から取得（CORS対応・登録不要）。公開後に値が入ります。 */
const COUNTER={base:'https://abacus.jasoncameron.dev', ns:'kotae-search-tool', key:'visits'};
const liveNumEl=document.getElementById('liveNum');
let liveTotal=300, liveCur=null;
function liveTarget(){
  const d=new Date(), h=d.getHours(), m=d.getMinutes();
  const curve=[2,2,1,1,1,2,3,4,6,7,7,8,8,7,6,6,7,8,9,9,8,6,4,3]; /* 時間帯ごとの賑わい */
  const base=curve[h];
  const scale=Math.min(2.2, 0.8+Math.log10(Math.max(liveTotal,10))/2); /* 累計が増えるほど少し多めに */
  const wave=Math.round(Math.sin((m/60)*Math.PI*2)*1.2); /* 1時間かけて緩く上下 */
  return Math.max(1, Math.round(base*scale)+wave);
}
function tickLive(){
  const t=liveTarget();
  if(liveCur==null) liveCur=t;
  else if(liveCur<t) liveCur+=(Math.random()<0.7?1:0);
  else if(liveCur>t) liveCur-=(Math.random()<0.7?1:0);
  else if(Math.random()<0.3) liveCur+=(Math.random()<0.5?1:-1);
  liveCur=Math.max(1,liveCur);
  if(liveNumEl) liveNumEl.textContent=liveCur;
}
if(liveNumEl){ tickLive(); setInterval(tickLive, 5000); }
(async function initCounter(){
  try{
    const r=await fetch(`${COUNTER.base}/hit/${COUNTER.ns}/${COUNTER.key}`);
    if(r.ok){ const d=await r.json(); if(d&&!isNaN(d.value)) liveTotal=Number(d.value); }
  }catch(e){}
  try{
    if('EventSource' in window){
      const es=new EventSource(`${COUNTER.base}/stream/${COUNTER.ns}/${COUNTER.key}`);
      es.onmessage=ev=>{ try{ const d=JSON.parse(ev.data); if(d&&!isNaN(d.value)) liveTotal=Number(d.value); }catch(_){} };
    }
  }catch(e){}
})();

  ptrStartY=e.touches[0].clientY; ptrPulling=false; ptrDist=0;

const canvas=document.getElementById('hwcanvas'), ctx=canvas.getContext('2d');
const charPanel=document.getElementById('charpanel'), candEl=document.getElementById('candidates'),
      detailEl=document.getElementById('chardetail');
let strokes=[], cur=null, drawing=false;

ctx.lineWidth=7; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#1a2236';
function hwPos(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
  return {x:Math.round(cx*(canvas.width/r.width)), y:Math.round(cy*(canvas.height/r.height))};
}
function hwStart(e){ e.preventDefault(); drawing=true; const p=hwPos(e); cur={x:[p.x],y:[p.y]}; ctx.beginPath(); ctx.moveTo(p.x,p.y); }
function hwMove(e){ if(!drawing) return; e.preventDefault(); const p=hwPos(e); cur.x.push(p.x); cur.y.push(p.y); ctx.lineTo(p.x,p.y); ctx.stroke(); }
function hwEnd(){ if(!drawing) return; drawing=false; if(cur&&cur.x.length) strokes.push(cur); cur=null; }
canvas.addEventListener('mousedown',hwStart); canvas.addEventListener('mousemove',hwMove);
window.addEventListener('mouseup',hwEnd);
canvas.addEventListener('touchstart',hwStart,{passive:false}); canvas.addEventListener('touchmove',hwMove,{passive:false});
canvas.addEventListener('touchend',hwEnd);

function hwRedraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  strokes.forEach(s=>{ ctx.beginPath(); ctx.moveTo(s.x[0],s.y[0]); for(let i=1;i<s.x.length;i++) ctx.lineTo(s.x[i],s.y[i]); ctx.stroke(); });
}
document.getElementById('hwClear').onclick=()=>{ strokes=[]; ctx.clearRect(0,0,canvas.width,canvas.height); candEl.innerHTML=''; };
document.getElementById('hwUndo').onclick=()=>{ strokes.pop(); hwRedraw(); };

const isKanji=s=>/[\u3400-\u9faf]/.test(s);

function fmtKun(r){
  let pre=''; if(r.startsWith('-')){pre='〜'; r=r.slice(1);}
  let suf=''; if(r.endsWith('-')){suf='〜'; r=r.slice(0,-1);}
  if(r.includes('.')){ const i=r.indexOf('.'); return pre+r.slice(0,i)+'('+r.slice(i+1)+')'+suf; }
  return pre+r+suf;
}
function charIntro(){
  return `<div class="char-msg">漢字を手書き、または上の欄に入力すると、ここに読み（音読み・訓読み）が表示されます。</div>`;

async function charLookup(ch){

    const _rd=[].concat(k.kun_readings||[],k.on_readings||[]).slice(0,4).join('・');
    const _mn=(k.meanings||[]).slice(0,3).join('、');

  }catch(e){

function charCard(k){
  const on=k.on_readings||[], kun=k.kun_readings||[];
  const onH=on.length?on.map(x=>`<span class="yomi-chip on">${x}</span>`).join(''):'<span class="yomi-none">—</span>';
  const kunH=kun.length?kun.map(x=>`<span class="yomi-chip kun">${fmtKun(x)}</span>`).join(''):'<span class="yomi-none">—</span>';
  const stats=[];
  if(k.stroke_count) stats.push(`<span>画数 ${k.stroke_count}</span>`);
  if(k.grade) stats.push(`<span>学年 ${k.grade}</span>`);
  if(k.jlpt) stats.push(`<span>JLPT N${k.jlpt}</span>`);
  const mean=(k.meanings&&k.meanings.length)?`<p class="char-mean"><b>意味</b>${k.meanings.slice(0,6).join('、')}</p>`:'';
  return `<div class="char-card">
    <div class="char-head"><div class="char-glyph">${k.kanji}</div><div class="char-stats">${stats.join('')}</div></div>
    <div class="yomi">
      <div class="yomi-row"><span class="yomi-label">音読み</span><span class="yomi-vals">${onH}</span></div>
      <div class="yomi-row"><span class="yomi-label">訓読み</span><span class="yomi-vals">${kunH}</span></div>
    </div>
    ${mean}
    <p class="char-note">送り仮名は ( ) で示しています。表外読み《外》の区別は、データの都合で表示していません。</p>
  </div>`;
}
async function readingSearch(r){

/* ============ 辞書（英和・和英）============ */
/* ブラウザから直接使える無料APIを利用：
   ・翻訳: MyMemory（CORS対応）   ・英単語の定義/発音: dictionaryapi.dev（CORS対応）
   MyMemoryの無料枠を増やすには、mmTranslate内のURL末尾に &de=あなたのメール を足してください。 */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
const hasJa=s=>/[ぁ-んァ-ヶ一-龯々ー]/.test(s);
const isLatin=s=>/[a-zA-Z]/.test(s)&&!hasJa(s);

async function mmTranslate(q,from,to){
  const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=${from}|${to}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('conn');
  const d=await r.json();
  let main=((d.responseData&&d.responseData.translatedText)||'').trim();
  if(/MYMEMORY WARNING|QUOTA|LIMIT EXCEEDED|INVALID/i.test(main)) throw new Error('conn');
  const alts=[];
  (d.matches||[]).forEach(m=>{ const t=(m.translation||'').trim(); if(t) alts.push(t); });
  const uniq=[...new Set(alts.filter(a=>a&&a.toLowerCase()!==main.toLowerCase()))].slice(0,6);
  return {main, alts:uniq};
}
async function enDefinition(word){
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    if(!r.ok) return null;
    const d=await r.json();
    return Array.isArray(d)?d[0]:null;
  }catch(e){ return null; }
}
function transRow(label,t){
  if(!t||!t.main) return '';
  const alts=t.alts.length?`<div class="tr-alts">${t.alts.map(a=>`<span class="tr-alt">${esc(a)}</span>`).join('')}</div>`:'';
  return `<div class="tr-main"><span class="tr-label">${label}</span><span class="tr-val">${esc(t.main)}</span></div>${alts}`;
}
function defBlocks(entry){
  if(!entry||!entry.meanings) return '';
  return entry.meanings.slice(0,4).map(mn=>{
    const defs=(mn.definitions||[]).slice(0,2).map(d=>`<li>${esc(d.definition)}</li>`).join('');
    return defs?`<div class="mean-block"><span class="mean-pos">${esc(mn.partOfSpeech||'')}</span><ol>${defs}</ol></div>`:'';
  }).join('');
}
function phonetic(entry){
  if(!entry) return '';
  if(entry.phonetic) return entry.phonetic;
  const p=(entry.phonetics||[]).find(x=>x.text);
  return p?p.text:'';
}
function dictIntro(){
  elResults.innerHTML=`<div class="char-msg">英単語や日本語を入力すると、訳（英和・和英）が表示されます。<br>例：apple ／ りんご ／ 走る ／ beautiful ／ 締め切り</div>`;
}
let dictTimer=null;
function onDictInput(){
  elClear.classList.toggle('show', !!elQ.value);
  updateRecentVisibility();
  clearTimeout(dictTimer);
  const q=elQ.value.trim();
  if(!q){ elAnswer.innerHTML=''; elMetaLabel.textContent='辞書'; elCount.innerHTML=''; dictIntro(); return; }
  dictTimer=setTimeout(()=>dictSearch(q),420);
}
async function dictSearch(q){
  elAnswer.innerHTML=''; elMetaLabel.textContent='検索結果'; elCount.innerHTML='';
  elResults.innerHTML=`<div class="char-msg">「${esc(q)}」を調べています…</div>`;
  try{
    let inner='';
    if(isLatin(q)){
      const [jaR,enR]=await Promise.allSettled([mmTranslate(q,'en','ja'), enDefinition(q)]);
      const ja=jaR.status==='fulfilled'?jaR.value:null;
      const entry=enR.status==='fulfilled'?enR.value:null;
      if(!entry && (!ja||!ja.main)){ throw new Error(jaR.status==='rejected'?'conn':'none'); }
      const ph=phonetic(entry);
      inner=`<div class="card dict-card">
        <div class="dict-word">${esc(q)}</div>${ph?`<div class="dict-kana">${esc(ph)}</div>`:''}
        ${transRow('和訳',ja)}
        ${defBlocks(entry)}
        <p class="dict-src">訳：MyMemory／英語定義：dictionaryapi.dev</p>
      </div>`;
    } else {
      let en; try{ en=await mmTranslate(q,'ja','en'); }catch(_){ throw new Error('conn'); }
      if(!en.main) throw new Error('none');
      inner=`<div class="card dict-card">
        <div class="dict-word">${esc(q)}</div>
        ${transRow('英訳',en)}
        <p class="dict-src">訳：MyMemory</p>
      </div>`;
    }
    elAnswer.innerHTML=`<div class="answer"><div class="ans-eyebrow">いちばん近い答え</div><div class="selected-cell">${inner}</div></div>`;
    elResults.innerHTML='';
    logUse('dict', q.toLowerCase(), q, q); ga('dict_lookup',{term:q});
    setItemMeta('dict', q, `「${q}」の英和・和英の訳と意味をすばやく調べる。`, q); routeWrite();
  }catch(e){
    if(e&&e.message==='none'){
      elResults.innerHTML=`<div class="char-msg">「${esc(q)}」の訳が見つかりませんでした。スペルや表記を変えて試してみてください。</div>`;
    }else{
      elResults.innerHTML=`<div class="char-msg err">辞書サービスに接続できませんでした。少し時間をおいて、もう一度お試しください（インターネット接続が必要です）。</div>`;
    }
  }
}

/* ============ ルーティング（ハッシュURL）＋動的メタ・構造化データ ============ */
const SITE='https://korenaninavi.jp/';
const DEFAULT_META={
  title: document.title,
  desc: (document.querySelector('meta[name="description"]')||{}).content||'',
  ogtitle: (document.querySelector('meta[property="og:title"]')||{}).content||'',
  ogdesc: (document.querySelector('meta[property="og:description"]')||{}).content||'',
  twtitle: (document.querySelector('meta[name="twitter:title"]')||{}).content||'',
  twdesc: (document.querySelector('meta[name="twitter:description"]')||{}).content||'',
  url: SITE
};
const ITEM_LABEL={ fn:it=>it.n, sc:it=>it.a, ui:it=>it.n, keigo:it=>it.casual, kata:it=>it.term };
const ITEM_DESC={
  fn:it=>`${it.n}（${it.r}）はExcelの関数。${it.d} 構文：=${it.s}`,
  sc:it=>`${it.a}のショートカットキー。${it.d}`,
  ui:it=>`${it.n}（${it.e}）は画面のUIパーツ。${it.d}`,
  keigo:it=>`「${it.casual}」のビジネス向け言い換え：${(it.polite||[]).join('／')}`,
  kata:it=>`${it.term}（${it.en||''}）の意味：${it.mean}`
};
function setMetaTag(sel,val){ const el=document.querySelector(sel); if(el) el.setAttribute('content',val); }
let ldItemEl=null;
function setItemMeta(m,name,desc,key){
  desc=(desc||'').replace(/\s+/g,' ').trim(); if(desc.length>140) desc=desc.slice(0,138)+'…';
  const title=`${name}とは？｜コレなにナビ`;
  const url=SITE+m+'/'+encodeURIComponent(key)+'/';
  document.title=title;
  setMetaTag('meta[name="description"]',desc);
  setMetaTag('meta[property="og:title"]',title);
  setMetaTag('meta[property="og:description"]',desc);
  setMetaTag('meta[name="twitter:title"]',title);
  setMetaTag('meta[name="twitter:description"]',desc);
  setMetaTag('meta[property="og:url"]',url);
  const can=document.querySelector('link[rel="canonical"]'); if(can) can.setAttribute('href',url);
  const ld={"@context":"https://schema.org","@type":"DefinedTerm",name:name,description:desc,
    inDefinedTermSet:{"@type":"DefinedTermSet",name:'コレなにナビ '+(MODE_LABELS[m]||''),url:SITE},url:url};
  if(!ldItemEl){ ldItemEl=document.createElement('script'); ldItemEl.type='application/ld+json'; ldItemEl.id='ld-item'; document.head.appendChild(ldItemEl); }
  ldItemEl.textContent=JSON.stringify(ld);
}
function resetMeta(){
  document.title=DEFAULT_META.title;
  setMetaTag('meta[name="description"]',DEFAULT_META.desc);
  setMetaTag('meta[property="og:title"]',DEFAULT_META.ogtitle);
  setMetaTag('meta[property="og:description"]',DEFAULT_META.ogdesc);
  setMetaTag('meta[name="twitter:title"]',DEFAULT_META.twtitle);
  setMetaTag('meta[name="twitter:description"]',DEFAULT_META.twdesc);
  setMetaTag('meta[property="og:url"]',DEFAULT_META.url);
  const can=document.querySelector('link[rel="canonical"]'); if(can) can.setAttribute('href',DEFAULT_META.url);
  if(ldItemEl){ ldItemEl.remove(); ldItemEl=null; }
}
function applyMetaFor(m,it){
  if(it && ITEM_LABEL[m]){ setItemMeta(m, ITEM_LABEL[m](it), ITEM_DESC[m]?ITEM_DESC[m](it):'', ITEM_LABEL[m](it)); }
  else resetMeta();
}
let routing=false;
function routeWrite(){
  if(routing) return;
  const q=(mode==='sub'||mode==='wari')?'':elQ.value.trim();
  const hash = q ? '#'+mode+'/'+encodeURIComponent(q) : (mode==='fn' ? '' : '#'+mode);
  try{
    if(hash){ if(location.hash!==hash) history.replaceState(null,'',hash); }
    else if(location.hash){ history.replaceState(null,'',location.pathname+location.search); }
  }catch(e){ if(hash) location.hash=hash; }
}
function routeRead(){
  let h=location.hash.replace(/^#/,''); if(!h) return false;
  const slash=h.indexOf('/');
  const m=slash<0?h:h.slice(0,slash);
  let q=slash<0?'':h.slice(slash+1);
  try{ q=decodeURIComponent(q); }catch(e){}
  if(!MODE_LABELS[m]) return false;
  routing=true; if(m!==mode) setMode(m); routing=false;
  if(m==='char'){ if(q){ elQ.value=q; elClear.classList.add('show'); charLookup(q); } }
  else if(m==='dict'){ if(q){ elQ.value=q; elClear.classList.add('show'); dictSearch(q); } }
  else if(m==='sub'||m==='wari'){ /* 状態のみ */ }
  else { elQ.value=q||''; if(q) elClear.classList.add('show'); else elClear.classList.remove('show'); activeCat=null; syncChips(); render(); }
  return true;
}
window.addEventListener('hashchange', ()=>{ routeRead(); });

initAds(); buildChips(); render(); renderRecent(); renderFav(); initSub(); initWari();
if(!routeRead()) routeWrite();

/* ============ 時計 ============ */
const nbDate=document.getElementById('nbDate'), nbWd=document.getElementById('nbWd'), nbTime=document.getElementById('nbTime');
const WDAY=['日','月','火','水','木','金','土'];
function tickClock(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  nbDate.textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  nbWd.textContent=`（${WDAY[d.getDay()]}）`;
  nbTime.innerHTML=`${p(d.getHours())}:${p(d.getMinutes())}<span class="nb-sec">:${p(d.getSeconds())}</span>`;
}
if(nbDate&&nbWd&&nbTime){ tickClock(); setInterval(tickClock,1000); }
